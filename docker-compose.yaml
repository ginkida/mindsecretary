services:
  mindsecretary:
    image: ghcr.io/ginkida/mindsecretary:latest
    build: .
    container_name: mindsecretary
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
