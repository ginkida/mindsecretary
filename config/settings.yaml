llm:
  model: "claude-sonnet-4-6"
  max_tokens: 1500
  max_tool_rounds: 5

stt:
  model: "whisper-large-v3"
  language: "ru"

embeddings:
  model: "voyage-3"

memory:
  search_top_k: 8
  relevance_weight: 0.6
  importance_weight: 0.4

proactive:
  morning_briefing: true
  evening_summary: true
  smart_questions: true
  decision_followups: true
  weekly_review: true
  weather_monitor: true
  birthday_alerts: true
  event_alerts: true

# Tunable intervals and thresholds (defaults shown)
tuning:
  reminder_check_minutes: 5
  weather_check_minutes: 60
  # Pre-event alerts: ping N minutes before each calendar event
  event_alert_lead_minutes: 15
  event_alert_check_minutes: 5
  process_timeout_sec: 90
  quiet_contact_days: 30
  quiet_contact_min_mentions: 3
  smart_question_min_interactions: 5
  # Cost circuit breaker — bot refuses LLM calls once daily spend crosses this
  daily_cost_limit_usd: 5.0
  # Rate limit — max messages per minute for the authorized user
  rate_limit_per_minute: 20
  # How long to keep interactions and api_costs rows (cleaned weekly)
  data_retention_days: 90
